{% extends 'base.html' %}
{%block content%}
<h1>Formulario de Post</h1>
<form action="" method="post">
    <label for="titulo">Título:</label><br>
    <input type="text" id="titulo" name="titulo" value="{{post.titulo if post}}" required><br><br>
    <label for="contenido">Contenido:</label><br>
    <textarea id="contenido" name="contenido" required> {{post.contenido if post}} </textarea><br><br>
    <label for="estado">Estado:</label><br>
    <select id="estado" name="estado" required>
        <option value="borrador" {{ 'selected' if post.estado == 'borrador'}}>Borrador</option>
        <option value="publicado" {{ 'selected' if post.estado == 'publicado'}}>Publicado</option>
    </select><br><br>
    <input type="submit" value="Enviar">
</form>
<p><a href="/">Volver</a></p>
{%endblock%}
