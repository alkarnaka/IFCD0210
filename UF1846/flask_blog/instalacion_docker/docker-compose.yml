#version '3.8'

services:
  front:
    build: ./front
    container_name: blog_front
    ports:
      - 5000:5000
    depends_on:
      - negocio
    environment:
      - API=http://negocio:5002/api
  
  negocio:
    build: ./negocio
    container_name: blog_negocio
    ports:
      - 5002:5002
    depends_on:
      - datos
    environment:
      - DATOS=http://datos:5001/data
    
  datos:
    build: ./datos
    container_name: blog_datos
    ports:
      - 5001:5001
    depends_on:
      - db
    environment:
      - DB_HOST=db
      - DB_USER=bloguser
      - DB_PASSWORD=blogpass
      - DB_NAME=flask_blog
      - DB_PORT=3306

  db:
    image: mysql:8.0
    container_name: blog_db
    ports:
      - 3366:3306
    #command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: rootpw
      MYSQL_DATABASE: flask_blog
      MYSQL_USER: bloguser
      MYSQL_PASSWORD: blogpass
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  


